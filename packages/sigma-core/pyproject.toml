[project]
name = "sigma-core"
version = "0.1.0"
description = "SIGMA — Sistema Inteligente de Gestión y Monitorización de Actividades"
readme = "README.md"
requires-python = ">=3.13.11"
dependencies = [
    "firebase-admin>=6.0.0",
]

[build-system]
requires = ["uv_build>=0.9.22,<0.10.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=1.0.0",
    "pytest-cov>=6.0.0",
    "httpx>=0.28.0",
]