[project]
name = "sigma-rest"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.13.11"
dependencies = [
    "fastapi[standard]>=0.135.1",
    "google-cloud-firestore>=2.25.0",
    "sigma-core",
]

[project.scripts]
sigma-rest = "sigma_rest:main"

[build-system]
requires = ["uv_build>=0.9.22,<0.10.0"]
build-backend = "uv_build"

[tool.uv.sources]
sigma-core = { workspace = true }

[dependency-groups]
dev = [
    "httpx>=0.28.0",
    "pytest>=8.3.0",
    "pytest-asyncio>=0.25.0",
    "pytest-cov>=6.0.0",
]
