[project]
name = "sigma-rest"
version = "0.1.0"
description = "SIGMA REST API adapter"
readme = "README.md"
requires-python = ">=3.13.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.34.0",
    "sigma-core",
]

[build-system]
requires = ["uv_build>=0.9.22,<0.10.0"]
build-backend = "uv_build"

[tool.uv.sources]
sigma-core = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=1.0.0",
    "httpx>=0.28.0",
]